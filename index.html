<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منطقة ألعاب سبيكترا للأطفال | Spectra Kids Zone</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0b0c10;       
            --card-bg: #1f2833;       
            --amber-glow: #ff7b00;    
            --white: #ffffff;
            --game-canvas-bg: #151a21;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif !important;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--white);
            overflow-x: hidden;
            text-align: center;
        }

        header {
            background-color: var(--card-bg);
            padding: 15px;
            border-bottom: 2px solid var(--amber-glow);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--white);
            text-decoration: none;
        }
        .logo span { color: var(--amber-glow); }

        .game-intro {
            padding: 20px 15px;
        }

        .game-intro h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--amber-glow);
            margin-bottom: 5px;
        }

        .game-intro p {
            font-size: 0.95rem;
            color: #ccc;
        }

        /* حاوية اللعبة المخصصة لأبعاد شاشات الآيفون والموبايل */
        #gameContainer {
            position: relative;
            width: 90%;
            max-width: 360px;
            height: 420px;
            background-color: var(--game-canvas-bg);
            margin: 10px auto;
            border: 3px solid var(--amber-glow);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(255, 123, 0, 0.15);
        }

        /* لوحة النتائج داخل اللعبة */
        .scoreboard {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            font-weight: 700;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 12px;
            border-radius: 20px;
        }

        #score { color: #25d366; }
        #lives { color: #ff3333; }

        /* العناصر المتساقطة والطبق */
        .game-element {
            position: absolute;
            font-size: 2rem;
            transition: transform 0.1s linear;
        }

        #basket {
            position: absolute;
            bottom: 10px;
            left: 145px; /* السنتر المبدئي */
            width: 70px;
            height: 40px;
            background-color: var(--amber-glow);
            border-radius: 0 0 35px 35px;
            border: 2px solid var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 0.7rem;
            color: var(--white);
        }

        /* شاشة البداية والنهاية */
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 12, 16, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 20px;
        }

        .game-btn {
            background-color: var(--amber-glow);
            color: var(--white);
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 123, 0, 0.4);
        }

        /* أزرار التحكم باللمس أسفل اللعبة لتسهيل اللعب على الأطفال */
        .controls {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 360px;
            margin: 15px auto 40px auto;
            gap: 20px;
        }

        .control-btn {
            flex: 1;
            background-color: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--white);
            padding: 15px;
            font-size: 1.5rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .control-btn:active {
            background-color: var(--amber-glow);
        }

        footer {
            background-color: var(--card-bg);
            color: #888;
            padding: 20px;
            font-size: 0.8rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">SPECTRA<span>.</span> Kids</a>
    </header>

    <section class="game-intro">
        <h1>منطقة ألعاب الأطفال 🍔</h1>
        <p>خلي طفلك يتسلى ويجمع وجبات سبيكترا اللذيذة لحد ما الأكل الفريش يجهز!</p>
    </section>

    <!-- منطقة اللعبة الفعلية -->
    <div id="gameContainer">
        <!-- لوحة النقط والقلوب -->
        <div class="scoreboard">
            <div>النقاط: <span id="score">0</span></div>
            <div>القلوب: <span id="lives">❤️❤️❤️</span></div>
        </div>

        <!-- شاشة البداية / النهاية -->
        <div id="gameOverlay" class="game-overlay">
            <h2 id="overlayTitle">جاهز للتحدي؟</h2>
            <p id="overlayDesc">حرك الطبق واجمع الأكل، وابعد عن القنابل 💣!</p>
            <button class="game-btn" id="startBtn">إبدأ اللعب</button>
        </div>

        <!-- طبق التجميع -->
        <div id="basket">سبيكترا</div>
    </div>

    <!-- أزرار تحكم مريحة جداً لأصابع الأطفال -->
    <div class="controls">
        <button class="control-btn" id="moveLeftBtn"><i class="fas fa-arrow-right"></i> يمين</button>
        <button class="control-btn" id="moveRightBtn">شمال <i class="fas fa-arrow-left"></i></button>
    </div>

    <footer>
        <p>© 2026 مطعم سبيكترا الهرم. مخصصة لراحة العائلات وأطفالهم.</p>
    </footer>

    <!-- برمجة كود اللعبة بالكامل وبدون أي تعقيد -->
    <script>
        const container = document.getElementById('gameContainer');
        const basket = document.getElementById('basket');
        const scoreTxt = document.getElementById('score');
        const livesTxt = document.getElementById('lives');
        const overlay = document.getElementById('gameOverlay');
        const startBtn = document.getElementById('startBtn');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayDesc = document.getElementById('overlayDesc');
        
        const moveLeftBtn = document.getElementById('moveLeftBtn');
        const moveRightBtn = document.getElementById('moveRightBtn');

        let score = 0;
        let lives = 3;
        let gameActive = false;
        let basketX = 145; // المكان في المنتصف
        const containerWidth = 360;
        const basketWidth = 70;
        let fallingItems = [];
        let gameLoopInterval;
        let spawnInterval;

        // الأكلات المتساقطة والقنبلة لزيادة الحماس
        const foodEmojis = ['🍔', '🍕', '🍟', '🍗', '💣'];

        // التحكم عن طريق الأزرار أسفل اللعبة
        moveLeftBtn.addEventListener('click', () => moveBasket(-30));
        moveRightBtn.addEventListener('click', () => moveBasket(30));

        // التحكم باللمس المباشر والسحب على الشاشة للآيفون
        container.addEventListener('touchmove', (e) => {
            if (!gameActive) return;
            let rect = container.getBoundingClientRect();
            let touchX = e.touches[0].clientX - rect.left;
            basketX = touchX - (basketWidth / 2);
            
            // حدود الحاوية
            if (basketX < 0) basketX = 0;
            if (basketX > (rect.width - basketWidth)) basketX = rect.width - basketWidth;
            
            basket.style.left = basketX + 'px';
        });

        function moveBasket(dir) {
            if (!gameActive) return;
            basketX += dir;
            if (basketX < 0) basketX = 0;
            if (basketX > (container.clientWidth - basketWidth)) basketX = container.clientWidth - basketWidth;
            basket.style.left = basketX + 'px';
        }

        // بدء اللعبة وتصفير العدادات
        startBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
            score = 0;
            lives = 3;
            scoreTxt.innerText = score;
            livesTxt.innerText = '❤️❤️❤️';
            gameActive = true;
            fallingItems.forEach(item => item.remove());
            fallingItems = [];
            
            // تشغيل محرك اللعبة
            gameLoopInterval = setInterval(updateGame, 30);
            spawnInterval = setInterval(spawnItem, 1200);
        });

        // إنشاء عنصر عشوائي يسقط من الأعلى
        function spawnItem() {
            if (!gameActive) return;
            const item = document.createElement('div');
            item.className = 'game-element';
            
            // اختيار عشوائي (أكل أو قنبلة)
            const randomEmoji = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
            item.innerText = randomEmoji;
            if (randomEmoji === '💣') item.dataset.isBomb = "true";
            
            item.style.top = '0px';
            // مكان عشوائي أفقي
            const maxLeft = container.clientWidth - 30;
            item.style.left = Math.floor(Math.random() * maxLeft) + 'px';
            
            container.appendChild(item);
            fallingItems.push(item);
        }

        // تحديث حركة اللعبة والاصطدام
        function updateGame() {
            for (let i = fallingItems.length - 1; i >= 0; i--) {
                const item = fallingItems[i];
                let topPos = parseInt(item.style.top) || 0;
                topPos += 5; // سرعة النزول
                item.style.top = topPos + 'px';

                // تحقق من الاصطدام بالطبق
                let itemLeft = parseInt(item.style.left);
                let basketLeft = basketX;
                
                if (topPos >= 370 && topPos <= 390) {
                    if (itemLeft + 30 >= basketLeft && itemLeft <= basketLeft + basketWidth) {
                        // حصل اصطدام!
                        if (item.dataset.isBomb === "true") {
                            lives--;
                            updateLivesUI();
                            if (lives <= 0) gameOver();
                        } else {
                            score += 10;
                            scoreTxt.innerText = score;
                        }
                        item.remove();
                        fallingItems.splice(i, 1);
                        continue;
                    }
                }

                // إذا خرج العنصر خارج الشاشة من الأسفل
                if (topPos > 420) {
                    if (item.dataset.isBomb !== "true") {
                        // لو فاتته أكلة يقل قلب
                        lives--;
                        updateLivesUI();
                        if (lives <= 0) gameOver();
                    }
                    item.remove();
                    fallingItems.splice(i, 1);
                }
            }
        }

        function updateLivesUI() {
            let heartString = '';
            for(let i=0; i<lives; i++) heartString += '❤️';
            livesTxt.innerText = heartString || '💔';
        }

        function gameOver() {
            gameActive = false;
            clearInterval(gameLoopInterval);
            clearInterval(spawnInterval);
            overlayTitle.innerText = "انتهت اللعبة! 🥳";
            overlayDesc.innerText = `طفلك جمع بنجاح ${score} نقطة واقضى على الملل!`;
            startBtn.innerText = "إعادة اللعب";
            overlay.style.display = 'flex';
        }
    </script>

</body>
</html>
